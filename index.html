<!doctype html>
<html lang="en">

    <style>
      /* CRITICAL: Never use display:none on skiptranslate — it kills the select element */
      /* Instead move everything off-screen so JS can still access it */
      .goog-te-banner-frame {
        position: fixed !important;
        top: -9999px !important;
        left: -9999px !important;
      }
      .skiptranslate {
        position: fixed !important;
        top: -9999px !important;
        left: -9999px !important;
        width: 1px !important;
        height: 1px !important;
        overflow: hidden !important;
      }
      body { top: 0 !important; }
      #goog-gt-tt { display: none !important; }
      .goog-te-balloon-frame { display: none !important; }
      .goog-tooltip { display: none !important; }
      .goog-tooltip-content { display: none !important; }
      .VIpgJd-ZVi9od-aZ2wEe-wOHMyf { display: none !important; }
    </style>
  </head>
  <body>
    <div id="google_translate_element"
         style="position:fixed;top:-9999px;left:-9999px;width:1px;height:1px;overflow:hidden;">
    </div>

    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>

    <script type="text/javascript">
      function googleTranslateElementInit() {
        new window.google.translate.TranslateElement(
          {
            pageLanguage: 'en',
            includedLanguages: 'ar,fr,de,es,zh-CN,hi,ur,tr,ru,ja',
            autoDisplay: false,
            layout: google.translate.TranslateElement.InlineLayout.SIMPLE
          },
          'google_translate_element'
        );
      }
    </script>
    <script type="text/javascript"
      src="https://translate.google.com/translate_a/element.js?cb=googleTranslateElementInit">
    </script>
  </body>
</html>
